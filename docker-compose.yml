version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: geminisquest_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-geminisquest}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - geminisquest_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geminisquest_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - geminisquest_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Migrate service - runs migrations and exits
  migrate:
    image: node:20-alpine
    container_name: geminisquest_migrate
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-geminisquest}
    command: npx prisma migrate deploy
    depends_on:
      db:
        condition: service_healthy
    networks:
      - geminisquest_net

  # App service - mainly for production or preview
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geminisquest_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-geminisquest}
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - geminisquest_net

volumes:
  postgres_data:
  redis_data:

networks:
  geminisquest_net:
    driver: bridge
